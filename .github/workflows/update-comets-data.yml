name: Update Comets Data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Aehnlichkeitsmodus fuer die Analyse"
        required: true
        default: "strict"
        type: choice
        options:
          - very-strict
          - strict
          - normal
      top:
        description: "Anzahl Top-Treffer in der Log-Ausgabe"
        required: true
        default: "20"
        type: string

permissions:
  contents: write

jobs:
  update-comets-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update pipeline
        run: |
          set -e
          python --version
          python run_pipeline.py --mode "${{ inputs.mode }}" --top "${{ inputs.top }}"

      - name: Commit and push changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/comets.csv data/comets_orbits.csv data/similar_orbits.csv data/exact_orbit_groups.csv

          if git diff --cached --quiet; then
            echo "Keine Datenaenderungen gefunden."
            exit 0
          fi

          ts="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git commit -m "chore(data): update comet datasets (${ts})"
          git push
